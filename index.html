/* ─── 수학 텍스트 → KaTeX 렌더링 (v2 추가) ─── */
function textToLatex(text) {
  if (!text) return text;
  let s = text;
  // √(...) → \sqrt{...}
  s = s.replace(/√\(([^)]+)\)/g, '\\sqrt{$1}');
  // 단독 √ 뒤 숫자/문자
  s = s.replace(/√(\d+)/g, '\\sqrt{$1}');
  s = s.replace(/√([a-zA-Z])/g, '\\sqrt{$1}');
  // ± → \pm
  s = s.replace(/±/g, '\\pm');
  // ² ³ → ^2 ^3
  s = s.replace(/²/g, '^2');
  s = s.replace(/³/g, '^3');
  // × → \times
  s = s.replace(/×/g, '\\times');
  // ÷ → \div
  s = s.replace(/÷/g, '\\div');
  // ≈ → \approx
  s = s.replace(/≈/g, '\\approx');
  // ≠ → \neq
  s = s.replace(/≠/g, '\\neq');
  // ≤ ≥ → \leq \geq
  s = s.replace(/≤/g, '\\leq');
  s = s.replace(/≥/g, '\\geq');
  // π → \pi
  s = s.replace(/π/g, '\\pi');
  return s;
}

function MathText({ text }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && text && typeof katex !== "undefined") {
      try {
        katex.render(textToLatex(text), ref.current, { throwOnError: false, displayMode: false });
      } catch { ref.current.textContent = text; }
    }
  }, [text]);
  if (!text) return null;
  if (typeof katex === "undefined") return <span>{text}</span>;
  return <span ref={ref} />;
}

/* ─── 이미지 압축 (v2 추가) ─── */
function compressImage(file, maxWidth = 1200, quality = 0.75) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      let result = canvas.toDataURL("image/jpeg", quality);
      // Firestore 1MB 한도 안전장치: base64가 700KB 초과 시 재압축
      if (result.length > 700000) {
        result = canvas.toDataURL("image/jpeg", 0.5);
      }
      if (result.length > 700000) {
        // 그래도 크면 해상도도 줄임
        const c2 = document.createElement("canvas");
        c2.width = Math.round(w * 0.6); c2.height = Math.round(h * 0.6);
        c2.getContext("2d").drawImage(canvas, 0, 0, c2.width, c2.height);
        result = c2.toDataURL("image/jpeg", 0.5);
      }
      resolve(result);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); resolve(null); };
    img.src = URL.createObjectURL(file);
  });
}

/* ─── Firebase config 정리 (v2 버그픽스) ─── */
/* Firebase 콘솔에서 복사한 JavaScript 객체를 JSON으로 변환 */
function cleanFirebaseConfig(raw) {
  let s = raw.trim();
  // "const firebaseConfig = " 등의 접두어 제거
  s = s.replace(/^(?:const|let|var)\s+\w+\s*=\s*/, "");
  // 끝의 세미콜론 제거
  s = s.replace(/;\s*$/, "");
  // JavaScript 객체의 키에 따옴표가 없는 경우 추가 (apiKey → "apiKey")
  s = s.replace(/(\{|,)\s*(\w+)\s*:/g, '$1"$2":');
  // 작은따옴표를 큰따옴표로
  s = s.replace(/'/g, '"');
  // 마지막 쉼표 제거 (trailing comma)
  s = s.replace(/,\s*([\}])/g, '$1');
  return s;
}

/* ─── Anthropic API 호출 (Vercel 프록시 경유) ─── */
async function analyzeWithAI(base64, mimeType) {
  const apiKey = localStorage.getItem("anthropic_api_key");
  if (!apiKey) throw new Error("API 키가 설정되지 않았습니다.\n설정 화면에서 입력해주세요.");

  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ imageBase64: base64, mimeType, apiKey }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || "API 호출 실패 (" + res.status + ")");
  }

  const data = await res.json();
  const text = data.content.filter((c) => c.type === "text").map((c) => c.text).join("");
  const clean = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
  return JSON.parse(clean);
}

/* ─── TTS 헬퍼 ─── */
function useVoice() {
  const [speaking, setSpeaking] = useState(null);
  const [voices, setVoices] = useState([]);

  useEffect(() => {
    const loadVoices = () => setVoices(window.speechSynthesis.getVoices());
    loadVoices();
    window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
    return () => {
      window.speechSynthesis.removeEventListener("voiceschanged", loadVoices);
      window.speechSynthesis.cancel();
    };
  }, []);

  const speak = useCallback((text, id) => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR"; u.rate = 0.9;
    const ko = voices.find((v) => v.lang.startsWith("ko"));
    if (ko) u.voice = ko;
    u.onstart = () => setSpeaking(id);
    u.onend = () => setSpeaking(null);
    u.onerror = () => setSpeaking(null);
    window.speechSynthesis.speak(u);
  }, [voices]);

  const stop = useCallback(() => { window.speechSynthesis.cancel(); setSpeaking(null); }, []);
  return { speaking, speak, stop };
}

/* ─── 단계별 풀이 ─── */
function StepByStep({ steps, errorStep }) {
  const [shown, setShown] = useState(1);
  const [showAll, setShowAll] = useState(false);
  const [voiceOn, setVoiceOn] = useState(false);
  const { speaking, speak, stop } = useVoice();
  const vis = showAll ? steps.length : shown;

  const speakStep = useCallback((s) => { speak(s.title + ". " + (s.explain || ""), s.num); }, [speak]);

  useEffect(() => {
    if (voiceOn && !showAll && shown <= steps.length) {
      const s = steps[shown - 1];
      if (s) { const t = setTimeout(() => speakStep(s), 300); return () => clearTimeout(t); }
    }
  }, [shown, voiceOn, showAll, steps, speakStep]);

  const handleNext = () => { stop(); setShown((n) => Math.min(n + 1, steps.length)); };

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <div className="flex items-center gap-2 text-sm text-slate-600">
          <Ic n="pen" sz={14} cls="text-amber-500" />
          <span>단계별 풀이 ({vis}/{steps.length})</span>
        </div>
        <div className="flex gap-2 items-center flex-wrap">
          <button onClick={() => { setVoiceOn(!voiceOn); if (voiceOn) stop(); }}
            className={"text-xs px-3 py-1 rounded-full flex items-center gap-1 transition " + (voiceOn ? "bg-indigo-600 text-white" : "bg-slate-100 hover:bg-slate-200 text-slate-700")}>
            {voiceOn ? "🔊 음성 ON" : "🔇 음성"}
          </button>
          <button onClick={() => { setShowAll(!showAll); setShown(showAll ? 1 : steps.length); stop(); }}
            className="text-xs px-3 py-1 rounded-full bg-slate-100 hover:bg-slate-200">
            {showAll ? "한 단계씩" : "전체 보기"}
          </button>
          <button onClick={() => { setShown(1); setShowAll(false); stop(); }}
            className="text-xs px-3 py-1 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center gap-1">
            <Ic n="rld" sz={11} /> 처음부터
          </button>
        </div>
      </div>
      {steps.slice(0, vis).map((s) => {
        const isE = errorStep && s.num === errorStep;
        const isSp = speaking === s.num;
        return (
          <div key={s.num} className={"p-4 rounded-xl border-2 transition-all duration-300 " + (isE ? "border-red-300 bg-red-50" : isSp ? "border-indigo-400 bg-indigo-50" : "border-slate-200 bg-white")}
            style={{ animation: "fadeInUp 0.3s ease-out" }}>
            <div className="flex items-start gap-3">
              <div className={"w-7 h-7 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0 " + (isE ? "bg-red-500" : "bg-indigo-600")}>{s.num}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between gap-2">
                  <div className="font-semibold text-slate-800">{s.title}</div>
                  <button onClick={() => isSp ? stop() : speakStep(s)}
                    className={"p-1.5 rounded-lg text-xs flex-shrink-0 transition " + (isSp ? "bg-indigo-600 text-white" : "bg-slate-100 hover:bg-slate-200 text-slate-500")}>
                    {isSp ? "⏸" : "🔊"}
                  </button>
                </div>
                {s.math && <div className="my-2 px-3 py-2 bg-slate-50 rounded-lg overflow-x-auto text-sm font-mono math-text"><MathText text={s.math} /></div>}
                {s.explain && <div className="text-sm text-slate-600">{s.explain}</div>}
                {isE && <div className="mt-2 text-xs text-red-600 font-medium flex items-center gap-1"><Ic n="alert" sz={12} /> 여기서부터 오류</div>}
              </div>
            </div>
          </div>
        );
      })}
      {!showAll && shown < steps.length && (
        <button onClick={handleNext}
          className="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-indigo-600 text-white font-semibold flex items-center justify-center gap-2 shadow-md active:scale-[0.98] transition-transform">
          <Ic n="cr" sz={16} /> 다음 단계
        </button>
      )}
      {vis === steps.length && (
        <div className="text-center py-3 text-emerald-600 font-semibold flex items-center justify-center gap-2">
          <Ic n="chk" sz={18} /> 풀이 완료!
        </div>
      )}
    </div>
  );
}

function UploadView({ onSave, onCancel }) {
  const [img, setImg] = useState(null);
  const [imgFile, setImgFile] = useState(null); // v2: File 객체 유지
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState("");
  const [error, setError] = useState(""); // v2: 에러 표시
  const [title, setTitle] = useState("");
  const [focused, setFocused] = useState(false);
  const fileRef = useRef(null);
  const camRef = useRef(null);
  const imgUrlRef = useRef(null);
  const abortRef = useRef(false);
  const mountedRef = useRef(true);

  useEffect(() => {
    mountedRef.current = true;
    return () => { mountedRef.current = false; abortRef.current = true; if (imgUrlRef.current) URL.revokeObjectURL(imgUrlRef.current); };
  }, []);

  const setImgSafe = (url) => {
    if (imgUrlRef.current) URL.revokeObjectURL(imgUrlRef.current);
    imgUrlRef.current = url;
    setImg(url);
    if (!url) setImgFile(null);
  };

  const handleFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) { setImgFile(f); setImgSafe(URL.createObjectURL(f)); }
    e.target.value = "";
  };

  const handlePaste = (e) => {
    const items = Array.from(e.clipboardData.items || []);
    const found = items.find((i) => i.type.startsWith("image/"));
    if (!found) return;
    e.preventDefault();
    const file = found.getAsFile();
    if (file) { setImgFile(file); setImgSafe(URL.createObjectURL(file)); }
  };

  const handleCancel = () => { abortRef.current = true; onCancel(); };

  /* v2: 실제 AI 분석 */
  const go = async () => {
    if (!imgFile) return;
    const apiKey = localStorage.getItem("anthropic_api_key");
    if (!apiKey) { setError("API 키가 설정되지 않았습니다. ⚙ 설정에서 입력해주세요."); return; }

    abortRef.current = false;
    setLoading(true);
    setError("");

    try {
      // 1) 이미지 압축
      if (mountedRef.current) setStatus("이미지 압축 중...");
      const compressed = await compressImage(imgFile, 1200, 0.75);
      if (abortRef.current || !mountedRef.current) { if (mountedRef.current) { setLoading(false); setStatus(""); } return; }
      if (!compressed) throw new Error("이미지 처리에 실패했습니다.");

      // 2) base64 추출
      const base64 = compressed.split(",")[1];
      const mimeType = "image/jpeg";

      // 3) AI 분석
      if (mountedRef.current) setStatus("AI가 문제를 분석하고 있습니다...");
      const result = await analyzeWithAI(base64, mimeType);
      if (abortRef.current || !mountedRef.current) { if (mountedRef.current) { setLoading(false); setStatus(""); } return; }

      // 4) 문제 객체 생성
      if (mountedRef.current) setStatus("저장 중...");
      const problem = {
        id: uid(),
        title: title || result.title || "AI 분석 문제",
        grade: result.grade || "", unit: result.unit || "", difficulty: result.difficulty || "중",
        tags: result.tags || [],
        problemImg: compressed, // base64 data URL (영구 저장 가능)
        solutionImg: null,
        problemText: result.problemText || "",
        errorStep: result.errorStep || null, errorAnalysis: result.errorAnalysis || null,
        solutionSteps: result.solutionSteps || [],
        keyConcepts: result.keyConcepts || [], keyFormulas: result.keyFormulas || [],
        tip: result.tip || "", notes: "",
        bookmarked: false, mastered: false,
        createdAt: Date.now(), reviewCount: 0, lastReviewed: null,
      };

      if (mountedRef.current) { setLoading(false); setStatus(""); }
      onSave(problem);
      imgUrlRef.current = null;
    } catch (err) {
      if (mountedRef.current) { setLoading(false); setStatus(""); setError(err.message || "분석에 실패했습니다."); }
    }
  };

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-4">
      <div className="flex items-center justify-between mb-2">
        <h2 className="text-xl font-bold text-slate-800">새 오답 문제 등록</h2>
        <button onClick={handleCancel} className="p-2 hover:bg-slate-100 rounded-lg"><Ic n="x" /></button>
      </div>

      <div className="bg-indigo-50 border border-indigo-200 rounded-xl px-4 py-2.5 text-sm text-indigo-800">
        💡 아래 <strong>붙여넣기 칸을 클릭</strong>한 뒤 ⌘V / Ctrl+V
      </div>

      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
        <label className="block text-sm font-semibold text-slate-700 mb-2">제목 (선택)</label>
        <input type="text" value={title} onChange={(e) => setTitle(e.target.value)}
          placeholder="예: 중2 중간고사 5번"
          className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
      </div>

      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
        <div className="flex items-center gap-2 mb-1">
          <Ic n="file" sz={16} cls="text-indigo-600" />
          <h3 className="font-semibold text-slate-800">문제 이미지 <span className="text-red-500">*</span></h3>
          {img && <span className="ml-auto text-xs text-emerald-600 font-semibold flex items-center gap-1"><Ic n="chk" sz={12} /> 완료</span>}
        </div>
        <div className="text-xs text-slate-500 mb-3">💡 풀이가 포함된 사진이면 AI가 자동으로 틀린 부분을 찾아줍니다</div>

        {img ? (
          <div className="flex items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 p-2.5">
            <img src={img} alt="문제 이미지" className="w-24 h-24 object-cover rounded-lg border border-slate-200 flex-shrink-0" />
            <div className="flex-1">
              <div className="text-xs text-emerald-600 font-semibold flex items-center gap-1"><Ic n="chk" sz={12} /> 이미지 첨부됨</div>
              <div className="text-[10px] text-slate-400 mt-0.5">교체하려면 X</div>
            </div>
            <button onClick={() => setImgSafe(null)} className="p-2 bg-white rounded-full shadow hover:bg-red-50 text-slate-400 flex-shrink-0">
              <Ic n="x" sz={14} />
            </button>
          </div>
        ) : (
          <div className="space-y-2">
            <div className="grid grid-cols-2 gap-2">
              <input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFile} />
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />
              <button onClick={() => camRef.current && camRef.current.click()}
                className="py-4 rounded-xl border-2 border-dashed border-indigo-300 bg-indigo-50 hover:bg-indigo-100 flex flex-col items-center gap-1 text-xs text-indigo-600">
                <Ic n="cam" sz={18} /><span className="font-medium">카메라</span>
              </button>
              <button onClick={() => fileRef.current && fileRef.current.click()}
                className="py-4 rounded-xl border-2 border-dashed border-indigo-300 bg-indigo-50 hover:bg-indigo-100 flex flex-col items-center gap-1 text-xs text-indigo-600">
                <Ic n="img" sz={18} /><span className="font-medium">사진에서 불러오기</span>
              </button>
            </div>
            <textarea onPaste={handlePaste} onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
              placeholder={focused ? "지금 Ctrl+V 를 누르세요!" : "여기를 클릭한 뒤 Ctrl+V 붙여넣기"}
              className={"w-full rounded-xl px-3 py-3.5 text-center text-xs resize-none outline-none cursor-pointer leading-relaxed transition-all duration-200 " +
                (focused ? "border-2 border-solid border-indigo-600 bg-indigo-100 ring-4 ring-indigo-200 shadow-lg placeholder-indigo-600 text-indigo-700"
                  : "border-2 border-dashed border-indigo-300 bg-white text-transparent placeholder-indigo-400 hover:border-indigo-400 hover:bg-indigo-50")}
              style={{ caretColor: "transparent" }} rows={2} onChange={() => {}}
              onKeyDown={(e) => { if (!(e.metaKey || e.ctrlKey)) e.preventDefault(); }} />
          </div>
        )}
      </div>

      {loading && status && (
        <div className="bg-indigo-50 border border-indigo-200 text-indigo-700 p-3 rounded-xl text-sm flex items-center justify-between">

      {/* v2: 에러 표시 */}
      {error && (

  const [notes, setNotes] = useState(initP.notes || "");

  const savedTimerRef = useRef(null);

  useEffect(() => { setProblem(initP); setNotes(initP.notes || ""); setMode("view"); setShowSol(false); setSaved(false); }, [initP.id]);
  useEffect(() => { return () => { if (savedTimerRef.current) clearTimeout(savedTimerRef.current); window.speechSynthesis.cancel(); }; }, []);

  const { speaking: speakingErr, speak: speakErr, stop: stopErr } = useVoice();

    upd({ ...problem, notes });

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
        <div className="flex items-start justify-between gap-3 mb-3">

            <div className="flex-1 flex items-center gap-2">
              <input type="text" value={titleDraft} onChange={(e) => setTitleDraft(e.target.value)}

            </div>

            <div className="flex items-center gap-2 flex-1 min-w-0">
              <h1 className="text-xl font-bold text-slate-800 truncate">{problem.title}</h1>
              <button onClick={() => setEditTitle(true)} className="p-1 hover:bg-slate-100 rounded-lg flex-shrink-0 text-slate-400 hover:text-indigo-600" title="제목 수정">
                <Ic n="pen" sz={14} />
              </button>
            </div>
          )}
          {problem.mastered && <span className="text-xs px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 font-semibold flex-shrink-0">✅ 마스터</span>}
        </div>

          {problem.difficulty && <span className={"px-2 py-1 rounded-full font-semibold " + (problem.difficulty === "상" ? "bg-red-100 text-red-700" : problem.difficulty === "중" ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700")}>난이도 {problem.difficulty}</span>}
          {(problem.tags || []).map((t, i) => <span key={i} className="px-2 py-1 rounded-full bg-slate-100 text-slate-700">#{t}</span>)}
        </div>
        {problem.reviewCount > 0 && <div className="mt-3 text-xs text-slate-500">복습 {problem.reviewCount}회{problem.lastReviewed && (" · 마지막: " + new Date(problem.lastReviewed).toLocaleDateString("ko-KR"))}</div>}

            </div>

        </div>

        <button onClick={() => { upd({ ...problem, reviewCount: (problem.reviewCount || 0) + 1, lastReviewed: Date.now() }); setMode("review"); setShowSol(false); }}

  const list = useMemo(() => {
    return problems.filter((p) => {
      if (fG !== "all" && p.grade !== fG) return false;
      if (fU !== "all" && p.unit !== fU) return false;
      if (fT === "bookmark" && !p.bookmarked) return false;
      if (fT === "unmastered" && p.mastered) return false;
      if (fT === "mastered" && !p.mastered) return false;
      if (q) {
        const h = [p.title, p.unit, p.problemText, ...(p.tags || [])].join(" ").toLowerCase();
        if (!h.includes(q.toLowerCase())) return false;
      }
      return true;
    }).sort((a, b) => b.createdAt - a.createdAt);
  }, [problems, q, fG, fU, fT]);

  useEffect(() => {
    if (!printMode) return;
    const timer = setTimeout(() => window.print(), 600);
    const exit = () => setPrintMode(false);
    window.addEventListener("afterprint", exit);
    let iosFb = null;
    const onFocus = () => { iosFb = setTimeout(exit, 300); };
    const onVis = () => { if (document.visibilityState === "visible") { iosFb = setTimeout(exit, 300); } };
    window.addEventListener("focus", onFocus);
    document.addEventListener("visibilitychange", onVis);
    return () => { clearTimeout(timer); if (iosFb) clearTimeout(iosFb); window.removeEventListener("afterprint", exit); window.removeEventListener("focus", onFocus); document.removeEventListener("visibilitychange", onVis); };
  }, [printMode]);

  if (printMode) {
    return (
      <div className="max-w-3xl mx-auto p-6 print-area" style={{background:"#fff",color:"#1e293b"}}>
        <button onClick={() => setPrintMode(false)} className="mb-4 text-sm np flex items-center gap-1 hover:underline" style={{color:"#4f46e5"}}><Ic n="cl" sz={14} /> 돌아가기</button>
        <div className="text-center mb-8 border-b-2 pb-6">
          <div className="text-3xl mb-2">📐</div>
          <h1 className="text-2xl font-bold" style={{color:"#1e293b"}}>NW_HWs' 수학 오답 노트</h1>
          <p className="text-sm mt-2" style={{color:"#64748b"}}>{fG !== "all" ? fG : "모든 학년"} · {fU !== "all" ? fU : "모든 단원"} · {list.length}문제 · {new Date().toLocaleDateString("ko-KR")}</p>
        </div>
        {list.map((p, idx) => (
          <div key={p.id} style={{ pageBreakInside: "avoid" }} className="mb-8 border-b pb-6">
            <h2 className="text-lg font-bold mb-2" style={{color:"#1e293b"}}>{idx + 1}. {p.title}</h2>
            <div className="flex flex-wrap gap-1 mb-2 text-xs">
              {p.grade && <span className="px-2 py-0.5 rounded" style={{background:"#e0e7ff",color:"#4f46e5"}}>{p.grade}</span>}
              {p.unit && <span className="px-2 py-0.5 rounded" style={{background:"#f3e8ff",color:"#7c3aed"}}>{p.unit}</span>}
              {p.difficulty && <span className="px-2 py-0.5 rounded" style={{background:"#f1f5f9"}}>난이도 {p.difficulty}</span>}
            </div>
            <img src={p.problemImg} alt={p.title} className="w-full max-h-72 object-contain border rounded-xl mb-3" onError={(e) => { e.target.style.display="none"; }} />
            {p.problemText && <p className="text-sm italic mb-2" style={{color:"#475569"}}>{p.problemText}</p>}
            {p.errorAnalysis && (
              <div className="p-3 border-2 rounded-xl mb-3 text-sm" style={{borderColor:"#fca5a5",background:"#fef2f2",color:"#991b1b"}}>
                ⚠ 오류{p.errorStep ? " ("+p.errorStep+"단계)" : ""}: {p.errorAnalysis}
              </div>
            )}
            {p.solutionSteps && p.solutionSteps.map((s) => (
              <div key={s.num} className={"flex gap-2 mb-2 text-sm" + (p.errorStep === s.num ? " pl-2 border-l-2" : "")} style={p.errorStep === s.num ? {borderColor:"#f87171"} : {}}>
                <span className="font-bold" style={{color:"#4f46e5"}}>{s.num}.</span>
                <div><strong>{s.title}</strong>{s.math && <span className="font-mono text-xs ml-1"><MathText text={s.math} /></span>}<div className="text-xs" style={{color:"#64748b"}}>{s.explain}</div></div>
              </div>
            ))}
            {(p.keyFormulas || []).length > 0 && (
              <div className="mt-2 p-3 rounded-xl" style={{background:"#eef2ff"}}>
                <div className="font-bold text-sm mb-1" style={{color:"#312e81"}}>📐 핵심 공식</div>
                {p.keyFormulas.map((f, i) => <div key={i} className="font-mono text-xs" style={{color:"#312e81"}}><MathText text={f} /></div>)}
              </div>
            )}
            {p.tip && <div className="mt-2 p-2 rounded-lg text-xs" style={{background:"#fffbeb",color:"#92400e"}}>💡 {p.tip}</div>}
            {p.notes && <div className="mt-2 p-2 rounded-lg text-xs" style={{background:"#f8fafc",color:"#475569"}}>📝 {p.notes}</div>}
          </div>
        ))}
        <div className="text-center text-xs pt-4 np" style={{color:"#94a3b8"}}>총 {list.length}문제 · {new Date().toLocaleDateString("ko-KR")} 출력</div>
      </div>
    );
  }

  return (
    <div className="max-w-3xl mx-auto p-4 space-y-3">
      <div className="relative">
        <Ic n="search" sz={16} cls="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
        <input type="text" value={q} onChange={(e) => setQ(e.target.value)}
          placeholder="제목, 단원, 개념으로 검색..."
          className="w-full pl-9 pr-3 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
      </div>
      <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
        {[
          { k: "all", l: "전체", c: problems.length },
          { k: "bookmark", l: "🔖 북마크", c: problems.filter((p) => p.bookmarked).length },
          { k: "unmastered", l: "❗ 미마스터", c: problems.filter((p) => !p.mastered).length },
          { k: "mastered", l: "✅ 마스터", c: problems.filter((p) => p.mastered).length },
        ].map((f) => (
          <button key={f.k} onClick={() => setFT(f.k)}
            className={"px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-colors " + (fT === f.k ? "bg-indigo-600 text-white" : "bg-white border border-slate-200 text-slate-700 hover:bg-slate-50")}>
            {f.l}{f.c > 0 && (" (" + f.c + ")")}
          </button>
        ))}
      </div>
      <div className="flex gap-2">
        <select value={fG} onChange={(e) => setFG(e.target.value)} className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm">
          {grades.map((g) => <option key={g} value={g}>{g === "all" ? "모든 학년" : g}</option>)}
        </select>
        <select value={fU} onChange={(e) => setFU(e.target.value)} className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm">
          {units.map((u) => <option key={u} value={u}>{u === "all" ? "모든 단원" : u}</option>)}
        </select>
        <button onClick={() => setPrintMode(true)} title="출력"
          className="px-3 py-2 bg-white border border-slate-200 rounded-xl text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 flex-shrink-0">
          <Ic n="print" sz={16} />
        </button>
      </div>
      {list.length === 0 ? (
        <div className="text-center py-16 text-slate-400">
          <div className="text-4xl mb-3">📚</div>
          <div className="text-sm">{problems.length === 0 ? "아직 등록된 오답이 없어요" : "조건에 맞는 문제가 없어요"}</div>
        </div>
      ) : (
        <div className="space-y-2">{list.map((p) => <Card key={p.id} p={p} onClick={() => onSelect(p)} />)}</div>
      )}
    </div>
  );
}

/* ─── 통계 ─── */
function Stats({ problems }) {
  const byUnit = useMemo(() => {
    const m = {};
    problems.forEach((p) => { if (p.unit) m[p.unit] = (m[p.unit] || 0) + 1; });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [problems]);
  const tot = problems.length;
  const mst = problems.filter((p) => p.mastered).length;
  const rev = problems.reduce((s, p) => s + (p.reviewCount || 0), 0);
  const mx = Math.max(...byUnit.map(([, c]) => c), 1);

  return (
    <div className="max-w-3xl mx-auto p-4 space-y-4">
      <h2 className="text-xl font-bold">📊 학습 현황</h2>
      <div className="grid grid-cols-2 gap-3">
        {[["전체 오답", tot, "from-indigo-500 to-indigo-600"], ["마스터", mst, "from-emerald-500 to-emerald-600"],
          ["총 복습", rev, "from-amber-500 to-amber-600"], ["마스터율", tot > 0 ? Math.round(mst / tot * 100) + "%" : "0%", "from-purple-500 to-purple-600"]
        ].map(([l, v, g]) => (
          <div key={l} className={"bg-gradient-to-br " + g + " rounded-2xl p-4 text-white"}>
            <div className="text-xs opacity-80 mb-1">{l}</div>
            <div className="text-3xl font-bold">{v}</div>
          </div>
        ))}
      </div>
      {byUnit.length > 0 && (
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
          <div className="font-semibold mb-3">단원별 오답</div>
          <div className="space-y-2">
            {byUnit.map(([u, c]) => (
              <div key={u}>
                <div className="flex justify-between text-sm mb-1"><span>{u}</span><span className="text-slate-500">{c}개</span></div>
                <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-indigo-400 to-indigo-600 rounded-full transition-all duration-500" style={{ width: (c / mx * 100) + "%" }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── 설정 (v2: API 키 + Firebase 설정 입력) ─── */
function Settings({ onClose, onConfigSaved }) {
  const [apiKey, setApiKey] = useState(localStorage.getItem("anthropic_api_key") || "");
  const [fbConfig, setFbConfig] = useState(localStorage.getItem("firebase_config") || "");
  const [showKey, setShowKey] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);
  const [saved, setSaved] = useState(false);

  const hasApi = !!localStorage.getItem("anthropic_api_key");
  const hasFb = !!localStorage.getItem("firebase_config");

  const handleSave = () => {
    if (apiKey.trim()) localStorage.setItem("anthropic_api_key", apiKey.trim());
    else localStorage.removeItem("anthropic_api_key");
    if (fbConfig.trim()) {
      const cleaned = cleanFirebaseConfig(fbConfig);
      try { JSON.parse(cleaned); } catch { setTestResult({ ok: false, msg: "❌ Firebase 설정 JSON 형식이 올바르지 않습니다." }); return; }
      localStorage.setItem("firebase_config", cleaned);
      if (onConfigSaved) onConfigSaved(cleaned);
    } else {
      localStorage.removeItem("firebase_config");
    }
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const handleTest = async () => {
    setTesting(true); setTestResult(null);
    try {
      const cfg = JSON.parse(cleanFirebaseConfig(fbConfig));
      if (firebase.apps.length) await firebase.app().delete();
      firebase.initializeApp(cfg);
      const db = firebase.firestore();
      await db.collection("problems").limit(1).get();
      setTestResult({ ok: true, msg: "✅ Firebase 연결 성공!" });
    } catch (e) {
      setTestResult({ ok: false, msg: "❌ 연결 실패: " + e.message });
    }
    setTesting(false);
  };

  const handleReset = () => {
    if (!confirm("모든 설정을 초기화하시겠습니까?")) return;
    localStorage.removeItem("anthropic_api_key");
    localStorage.removeItem("firebase_config");
    setApiKey(""); setFbConfig(""); setTestResult(null);
  };

  return (
    <div className="max-w-xl mx-auto p-4 space-y-4">
      <div className="flex items-center gap-2">
        <button onClick={onClose} className="p-2 -ml-2"><Ic n="cl" /></button>
        <h2 className="text-lg font-bold">설정</h2>
      </div>

      {/* 연결 상태 */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 text-sm space-y-2">
        <div className="font-semibold">연결 상태</div>
        <div>API: {hasApi ? "✅ 설정됨" : "⏳ 미설정"}</div>
        <div>Firebase: {hasFb ? "✅ 설정됨" : "⏳ 미설정"}</div>
      </div>

      {/* API 키 */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 space-y-3">
        <div>
          <div className="font-semibold text-sm">Anthropic API 키</div>
          <div className="text-xs text-slate-500 mt-1">
            <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" className="text-indigo-600 underline">console.anthropic.com</a>에서 발급
          </div>
        </div>
        <div className="flex gap-2">
          <input type={showKey ? "text" : "password"} value={apiKey}
            onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-..."
            className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-indigo-500 outline-none" />
          <button onClick={() => setShowKey(!showKey)}
            className="px-3 py-2 bg-slate-100 rounded-lg text-xs font-semibold hover:bg-slate-200 flex-shrink-0">
            {showKey ? "숨기기" : "보기"}
          </button>
        </div>
      </div>

      {/* Firebase 설정 */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 space-y-3">
        <div>
          <div className="font-semibold text-sm">Firebase 설정</div>
          <div className="text-xs text-slate-500 mt-1">Firebase 콘솔 → 프로젝트 설정 → 내 앱 → firebaseConfig JSON 복사</div>
        </div>
        <textarea value={fbConfig} onChange={(e) => setFbConfig(e.target.value)}
          placeholder='{"apiKey":"AIza...","authDomain":"...firebaseapp.com","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'
          rows={5}
          className="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs font-mono focus:ring-2 focus:ring-indigo-500 outline-none" />
        <button onClick={handleTest} disabled={!fbConfig.trim() || testing}
          className="w-full py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-sm font-semibold disabled:opacity-50 transition-colors">
          {testing ? "⟳ 테스트 중..." : "🔍 연결 테스트"}
        </button>
        {testResult && (
          <div className={"p-3 rounded-xl text-sm font-medium " + (testResult.ok ? "bg-emerald-50 text-emerald-700 border border-emerald-200" : "bg-red-50 text-red-700 border border-red-200")}>
            {testResult.msg}
          </div>
        )}
      </div>

      {/* 저장 */}
      <button onClick={handleSave}
        className={"w-full py-3.5 rounded-xl font-bold text-white shadow-lg transition-all active:scale-[0.98] " + (saved ? "bg-emerald-500" : "bg-gradient-to-r from-indigo-600 to-purple-600")}>
        {saved ? "✅ 저장 완료!" : "💾 설정 저장"}
      </button>

      {saved && (
        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-sm text-emerald-700">
          ✅ 저장되었습니다. 페이지를 새로고침하면 Firebase 연동이 활성화됩니다.
        </div>
      )}

      {/* 초기화 */}
      <button onClick={handleReset}
        className="w-full py-2 rounded-xl text-sm text-red-500 hover:bg-red-50 transition-colors">
        🗑 설정 초기화
      </button>

      {/* 안내 */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm text-blue-800 space-y-1">
        <div>💡 API 키와 Firebase 설정은 <strong>이 기기의 브라우저</strong>에만 저장됩니다.</div>
        <div>📱 아이패드/아이폰 각각에서 설정이 필요합니다.</div>
        {!hasApi && !hasFb && <div>📋 설정 전에는 데모 데이터가 표시됩니다.</div>}
      </div>
    </div>
  );
}

/* ─── 앱 (v2: Firebase 동적 초기화 + Firestore CRUD) ─── */
function App() {
  const [problems, setProblems] = useState([]);
  const [view, setView] = useState("library");
  const [selected, setSelected] = useState(null);
  const [dark, setDark] = useState(false);
  const [fsize, setFsize] = useState(0);
  const [appLoading, setAppLoading] = useState(true);
  const dbRef = useRef(null); // v2: Firestore 참조

  const go = (v) => { setSelected(null); setView(v); };
  const fsLabel = ["가", "가+", "가++"][fsize];

  /* v2: Firebase 초기화 + Firestore 데이터 로딩 */
  const initAndLoad = useCallback(async () => {
    const raw = localStorage.getItem("firebase_config");
    if (!raw) {
      // 설정 없음 → 데모 모드
      setProblems([...MOCK]);
      setAppLoading(false);
      return;
    }
    try {
      const cfg = JSON.parse(raw);
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      dbRef.current = firebase.firestore();
      const snap = await dbRef.current.collection("problems").orderBy("createdAt", "desc").get();
      const data = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      setProblems(data);
    } catch (e) {
      console.error("Firebase init error:", e);
      setProblems([...MOCK]); // 오류 시 데모 모드
    }
    setAppLoading(false);
  }, []);

  useEffect(() => {
    initAndLoad();
    // 첫 실행 시 설정이 없으면 설정 화면으로
    const hasConfig = localStorage.getItem("firebase_config") || localStorage.getItem("anthropic_api_key");
    if (!hasConfig) setView("settings");
  }, [initAndLoad]);

  /* v2: Firestore 저장 콜백들 */
  const handleNewProblem = async (p) => {
    if (dbRef.current) {
      try { await dbRef.current.collection("problems").doc(p.id).set(p); } catch (e) { console.error("Save error:", e); }
    }
    setProblems((prev) => [p, ...prev]);
    setSelected(p);
    setView("detail");
  };

  const handleUpdate = async (u) => {
    if (dbRef.current) {
      try { await dbRef.current.collection("problems").doc(u.id).set(u); } catch (e) { console.error("Update error:", e); }
    }
    setProblems((prev) => prev.map((p) => p.id === u.id ? u : p));
    setSelected(u);
  };

  const handleDelete = async (id) => {
    if (dbRef.current) {
      try { await dbRef.current.collection("problems").doc(id).delete(); } catch (e) { console.error("Delete error:", e); }
    }
    setProblems((prev) => prev.filter((p) => p.id !== id));
    go("library");
  };

  const handleReload = async () => {
    if (dbRef.current) {
      try {
        const snap = await dbRef.current.collection("problems").orderBy("createdAt", "desc").get();
        setProblems(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
      } catch (e) { console.error("Reload error:", e); }
    } else {
      setProblems([...MOCK]);
    }
    go("library");
  };

  const handleConfigSaved = async (configStr) => {
    try {
      const cfg = JSON.parse(configStr);
      // 기존 앱이 있으면 삭제 후 재초기화
      if (firebase.apps.length) {
        await firebase.app().delete();
      }
      firebase.initializeApp(cfg);
      dbRef.current = firebase.firestore();
      const snap = await dbRef.current.collection("problems").orderBy("createdAt", "desc").get();
      setProblems(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
    } catch (e) { console.error("Config apply error:", e); }
  };

  if (appLoading) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center">
        <div className="text-center">
          <div className="text-4xl mb-3 animate-pulse">📐</div>
          <div className="text-sm text-slate-500">로딩 중...</div>
        </div>
      </div>
    );
  }

  return (
    <div className={"min-h-screen bg-slate-50 pb-20 " + (dark ? "dm " : "") + (fsize === 1 ? "fs1" : fsize === 2 ? "fs2" : "")}
      style={{ fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <style>{`
        @keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .scrollbar-hide::-webkit-scrollbar{display:none}
        .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
        .fs1{transform:scale(1.15);transform-origin:top left}
        .fs2{transform:scale(1.3);transform-origin:top left}
        .dm{background:#0f172a!important;color:#cbd5e1}
        .dm .bg-slate-50{background:#0f172a!important}
        .dm .bg-white{background:#1e293b!important}
        .dm header,.dm nav{background:#0f172a!important;border-color:#1e293b!important}
        .dm .bg-slate-100{background:#334155!important}
        .dm [class*="border-slate"]{border-color:#334155!important}
        .dm [class*="shadow-sm"]{box-shadow:0 0 12px rgba(0,240,255,.08)!important}
        .dm .text-slate-800{color:#00f0ff!important;text-shadow:0 0 8px rgba(0,240,255,.4)}
        .dm .text-slate-700{color:#e2e8f0!important}

            <h1 className="font-bold text-slate-800 text-sm">NW_HWs' 수학 오답 노트</h1>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={() => setFsize((n) => (n + 1) % 3)} title="글자 크기 조절"

              <span className={fsize > 0 ? (dark ? "text-cyan-400" : "text-indigo-600") : ""}>{fsLabel}</span>
            </button>
            <button onClick={() => setDark(!dark)} title={dark ? "라이트 모드" : "다크 모드"}
              className={"p-2 rounded-lg text-lg " + (dark ? "hover:bg-slate-700" : "hover:bg-slate-100")}>
              {dark ? "☀️" : "🌙"}
            </button>
            <button onClick={handleReload} title="새로고침"
              className={"p-2 rounded-lg " + (dark ? "hover:bg-slate-700 text-slate-400" : "hover:bg-slate-100 text-slate-500")}>
              <Ic n="rld" sz={16} />
            </button>
            <button onClick={() => setView("settings")} title="설정"
              className={"p-2 rounded-lg " + (dark ? "hover:bg-slate-700 text-slate-400" : "hover:bg-slate-100 text-slate-500")}>
              <Ic n="cog" sz={18} />
            </button>
          </div>
        </div>
      </header>

      <main>
        {view === "library" && <Library problems={problems} onSelect={(p) => { setSelected(p); setView("detail"); }} />}
        {view === "upload" && <UploadView onSave={handleNewProblem} onCancel={() => setView("library")} />}
        {view === "stats" && <Stats problems={problems} />}
        {view === "settings" && <Settings onClose={() => go("library")} onConfigSaved={handleConfigSaved} />}
        {view === "detail" && selected && (
          <Detail problem={selected} onClose={() => go("library")} onUpdate={handleUpdate} onDelete={handleDelete} />
        )}
      </main>

      <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-30 no-print">
        <div className="max-w-3xl mx-auto grid grid-cols-3 relative">

          </button>
        </div>
